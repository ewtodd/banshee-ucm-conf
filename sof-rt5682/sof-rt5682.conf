	}
	False.Include.rt5682-init.File "rt5682-init.conf"
}

If.rt5682s {
	Condition {
		Type String
		Empty "$${var:rt5682s}"
	}
	False.Include.rt5682s-init.File "/codecs/rt5682s/init.conf"
}
