# headset codecs

If.rt5682 {
	Condition {
		Type String
		Empty "$${var:rt5682}"
	}
	False.Include.headset.File "rt5682-headset.conf"
}

If.rt5682s {
	Condition {
		Type String
		Empty "$${var:rt5682s}"
	}
	False.Include.headset.File "/codecs/rt5682s/headset.conf"
}

# speaker amp

If.max98360a {
	Condition {
		Type String
		Empty "$${var:max98360a}"
	}
	False.Include.speaker.File "/codecs/max98357a/speaker.conf"
}

# DMIC

Include.pcm_split.File "/common/pcm/split.conf"

Macro [
	{
		SplitPCM {
			Name "dmic_stereo_in"
			Direction Capture
			Format S32_LE
			Channels 2
			HWChannels 4
			HWChannelPos0 FL
			HWChannelPos1 FR
			HWChannelPos2 FL
			HWChannelPos3 FR
		}
	}
]

SectionDevice."Mic" {
	Comment "Internal Microphone"

	Value {
		CapturePrioirty 100
		CapturePCM "hw:${CardId},${var:dmicpcm}"
		CaptureChannels 4
	}
	Macro.pcm_split.SplitPCMDevice {
		Name "dmic_stereo_in"
		Direction Capture
		Device "${var:dmicpcm}"
		HWChannels 4
		Channels 2
		Channel0 0
		Channel1 1
		ChannelPos0 FL
		ChannelPos1 FR
	}
}

Include.hdmi.File "/codecs/hda/${var:hdmi}.conf"
